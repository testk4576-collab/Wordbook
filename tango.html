<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Wordbook App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 {
            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .flipped {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <div class="max-w-md mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600">My Wordbook</h1>
            <p class="text-gray-500">英単語を効率よく暗記しよう</p>
        </header>

        <!-- メインコンテンツ -->
        <div id="app">
            <!-- テスト画面 -->
            <div id="testView" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <span id="progressText" class="text-sm font-medium text-gray-600">0 / 0</span>
                    <button onclick="showHome()" class="text-sm text-indigo-500 hover:underline">終了する</button>
                </div>

                <div class="perspective-1000 w-full h-64 mb-8">
                    <div id="flashcard" class="relative w-full h-full transition-transform duration-500 preserve-3d cursor-pointer shadow-xl rounded-2xl">
                        <!-- 表 (英語) -->
                        <div class="absolute inset-0 backface-hidden bg-white border-2 border-indigo-100 rounded-2xl flex flex-col items-center justify-center p-6 text-center" onclick="handleFrontClick()">
                            <span class="text-xs text-gray-400 mb-2 uppercase tracking-widest">Question</span>
                            <div class="flex items-center gap-2">
                                <h2 id="questionText" class="text-4xl font-bold text-gray-800">Word</h2>
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                                </svg>
                            </div>
                            <p class="mt-4 text-sm text-gray-400 italic">タップして答えを見る</p>
                        </div>
                        <!-- 裏 (日本語) -->
                        <div class="absolute inset-0 backface-hidden bg-indigo-50 border-2 border-indigo-200 rounded-2xl flex flex-col items-center justify-center p-6 text-center rotate-y-180" onclick="flipCard()">
                            <span class="text-xs text-indigo-400 mb-2 uppercase tracking-widest">Answer</span>
                            <h2 id="answerText" class="text-3xl font-bold text-indigo-900">和訳</h2>
                            <p class="mt-4 text-sm text-gray-400 italic">タップして戻る</p>
                        </div>
                    </div>
                </div>

                <!-- 判定ボタン -->
                <div id="judgementBtns" class="flex gap-4 opacity-0 transition-opacity duration-300">
                    <button onclick="handleResult(false)" class="flex-1 bg-rose-100 text-rose-600 py-4 rounded-xl font-bold hover:bg-rose-200 transition-colors">
                        覚えてない
                    </button>
                    <button onclick="handleResult(true)" class="flex-1 bg-emerald-100 text-emerald-600 py-4 rounded-xl font-bold hover:bg-emerald-200 transition-colors">
                        覚えた！
                    </button>
                </div>
            </div>

            <!-- ホーム・管理画面 -->
            <div id="homeView">
                <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
                    <h3 class="font-bold text-lg mb-4 text-center">テストを開始</h3>
                    <div class="flex flex-col gap-3">
                        <button onclick="startTest()" id="startBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all disabled:opacity-50">
                            ランダムに出題
                        </button>
                        <p id="totalCountText" class="text-center text-sm text-gray-400">登録済み: 0単語</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
                    <h3 class="font-bold text-lg mb-2">単語を一括追加</h3>
                    <p class="text-xs text-gray-400 mb-4">
                        「英語<span class="font-bold text-indigo-600 px-1 text-base">,</span>日本語」の形式で入力してください（1行1単語）
                    </p>
                    <textarea id="bulkInput" rows="5" class="w-full border border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none mb-3" placeholder="apple,りんご&#10;banana,バナナ&#10;desk,机"></textarea>
                    <button onclick="importWords()" class="w-full bg-indigo-50 text-indigo-600 py-3 rounded-lg font-bold hover:bg-indigo-100 transition-colors">
                        リストに追加する
                    </button>
                </div>

                <!-- 設定・リセット -->
                <div class="text-center p-4">
                    <button onclick="confirmClearAll()" class="text-sm text-rose-400 hover:text-rose-600 transition-colors">
                        データをすべて消去する
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- モーダル (終了時) -->
    <div id="resultModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 text-center">
            <h3 class="text-xl font-bold mb-2">テスト完了！</h3>
            <p id="finalScore" class="text-gray-600 mb-6">よく頑張りました。</p>
            <button onclick="closeModal()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">ホームへ戻る</button>
        </div>
    </div>

    <script>
        // 状態管理
        let words = JSON.parse(localStorage.getItem('my_wordbook_data')) || [];
        let testQueue = [];
        let currentIndex = 0;
        let score = 0;

        // UI要素
        const homeView = document.getElementById('homeView');
        const testView = document.getElementById('testView');
        const flashcard = document.getElementById('flashcard');
        const bulkInput = document.getElementById('bulkInput');
        const totalCountText = document.getElementById('totalCountText');
        const startBtn = document.getElementById('startBtn');

        function updateUI() {
            totalCountText.textContent = `登録済み: ${words.length}単語`;
            startBtn.disabled = words.length === 0;
            localStorage.setItem('my_wordbook_data', JSON.stringify(words));
        }

        // 読み上げ機能
        function speak(text) {
            if (!window.speechSynthesis) return;
            // 実行中の読み上げがあればキャンセル
            window.speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'en-US';
            uttr.rate = 0.9; // 少しゆっくりめに
            window.speechSynthesis.speak(uttr);
        }

        // カード表面クリック時の挙動（読み上げ or めくる）
        function handleFrontClick() {
            if (!flashcard.classList.contains('flipped')) {
                // まだめくっていないなら、まずは読み上げ
                const word = testQueue[currentIndex];
                speak(word.en);
                // その後めくる
                flipCard();
            }
        }

        // テスト開始
        function startTest() {
            if (words.length === 0) return;
            // シャッフル
            testQueue = [...words].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            score = 0;
            
            homeView.classList.add('hidden');
            testView.classList.remove('hidden');
            renderCurrentWord();
        }

        function renderCurrentWord() {
            const word = testQueue[currentIndex];
            document.getElementById('questionText').textContent = word.en;
            document.getElementById('answerText').textContent = word.ja;
            document.getElementById('progressText').textContent = `${currentIndex + 1} / ${testQueue.length}`;
            
            // カードを表面に戻す
            flashcard.classList.remove('flipped');
            document.getElementById('judgementBtns').classList.add('opacity-0');
            document.getElementById('judgementBtns').style.pointerEvents = 'none';

            // 自動読み上げ
            setTimeout(() => {
                speak(word.en);
            }, 300);
        }

        function flipCard() {
            flashcard.classList.toggle('flipped');
            if (flashcard.classList.contains('flipped')) {
                document.getElementById('judgementBtns').classList.remove('opacity-0');
                document.getElementById('judgementBtns').style.pointerEvents = 'auto';
            }
        }

        function handleResult(isCorrect) {
            if (isCorrect) score++;
            
            currentIndex++;
            if (currentIndex < testQueue.length) {
                renderCurrentWord();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('finalScore').textContent = `${testQueue.length}単語中、${score}個覚えました！`;
            document.getElementById('resultModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.add('hidden');
            showHome();
        }

        function showHome() {
            testView.classList.add('hidden');
            homeView.classList.remove('hidden');
        }

        // 一括追加
        function importWords() {
            const text = bulkInput.value.trim();
            if (!text) return;

            const lines = text.split('\n');
            let addedCount = 0;

            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 2) {
                    const en = parts[0].trim();
                    const ja = parts[1].trim();
                    if (en && ja) {
                        words.push({ en, ja });
                        addedCount++;
                    }
                }
            });

            if (addedCount > 0) {
                bulkInput.value = '';
                updateUI();
                alert(`${addedCount}件の単語を追加しました！`);
            } else {
                alert('形式が正しくありません。「英語,日本語」の形式で入力してください。');
            }
        }

        // データの全消去
        function confirmClearAll() {
            const res = confirm('登録されているすべての単語を消去します。よろしいですか？');
            if (res) {
                words = [];
                updateUI();
                alert('すべてのデータを削除しました。');
            }
        }

        // 初期化
        updateUI();
    </script>
</body>
</html>
